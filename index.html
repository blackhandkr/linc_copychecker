<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리니지 공략 도용 검사기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --bg2: #161618; --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8e8ea; --text2: #8a8a92; --text3: #55555c;
    --accent: #e8a030; --accent2: #c88820;
    --danger: #e85050; --danger-bg: rgba(232,80,80,0.1);
    --warning: #e8a030; --warning-bg: rgba(232,160,48,0.1);
    --success: #4caf80; --success-bg: rgba(76,175,128,0.1);
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  .layout { max-width: 780px; margin: 0 auto; padding: 0 20px; }

  header { border-bottom: 0.5px solid var(--border); padding: 18px 0; margin-bottom: 36px; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-mark { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.05em; }
  .logo-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--success); background: var(--success-bg); border: 0.5px solid rgba(76,175,128,0.25); padding: 3px 10px; border-radius: 20px; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 8px; }

  .url-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .url-input {
    flex: 1; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius);
    padding: 10px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .url-input:focus { border-color: var(--accent2); }
  .url-input::placeholder { color: var(--text3); }
  .analyze-btn {
    background: var(--accent); color: #0e0e0f; border: none; border-radius: var(--radius);
    padding: 10px 20px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
  }
  .analyze-btn:hover { background: #f0b040; }
  .analyze-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  .tip-bar { font-size: 12px; color: var(--text3); padding: 9px 0 0; line-height: 1.6; }

  .divider { height: 0.5px; background: var(--border); margin: 28px 0; }

  /* --- Loading --- */
  .loading-wrap { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px 22px; }
  .loading-head { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 16px; }
  .spinner { width: 13px; height: 13px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-list { display: flex; flex-direction: column; gap: 5px; }
  .step { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text3); padding-left: 18px; position: relative; transition: color 0.2s; }
  .step::before { content: '·'; position: absolute; left: 6px; }
  .step.active { color: var(--text2); }
  .step.done { color: var(--success); }
  .step.done::before { content: '✓'; }
  .step.fail { color: var(--danger); }
  .step.fail::before { content: '✗'; }

  /* --- Error --- */
  .error-box { background: var(--danger-bg); border: 0.5px solid rgba(232,80,80,0.25); border-radius: var(--radius); padding: 13px 16px; font-size: 13px; color: var(--danger); line-height: 1.8; }

  /* --- Result header --- */
  .result-head { margin-bottom: 20px; }
  .target-card { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 16px; }
  .target-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .target-url { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent2); text-decoration: none; word-break: break-all; }
  .target-url:hover { text-decoration: underline; }

  .summary-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .summary-chip { flex: 1; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; text-align: center; }
  .summary-chip-val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); }
  .summary-chip-val.danger { color: var(--danger); }
  .summary-chip-val.warning { color: var(--warning); }
  .summary-chip-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* --- Table --- */
  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text3); text-align: left; padding: 0 10px 8px; border-bottom: 0.5px solid var(--border);
  }
  .results-table th.right { text-align: right; }
  .results-table td { padding: 11px 10px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table tr:hover td { background: var(--bg2); }

  .rank-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text3); }
  .post-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
  .post-name a { color: inherit; text-decoration: none; }
  .post-name a:hover { color: var(--accent2); }
  .post-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); }

  .bar-cell { width: 130px; }
  .bar-wrap { display: flex; align-items: center; gap: 7px; }
  .bar-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-fill.high { background: var(--danger); }
  .bar-fill.medium { background: var(--warning); }
  .bar-fill.low { background: var(--bg3); }
  .bar-fill.none { background: var(--bg3); }
  .bar-pct { font-family: 'IBM Plex Mono', monospace; font-size: 11px; min-width: 30px; text-align: right; }
  .bar-pct.high { color: var(--danger); }
  .bar-pct.medium { color: var(--warning); }
  .bar-pct.low { color: var(--text3); }
  .bar-pct.none { color: var(--text3); }

  .risk-pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; display: inline-block; }
  .risk-pill.high { background: var(--danger-bg); color: var(--danger); border: 0.5px solid rgba(232,80,80,0.25); }
  .risk-pill.medium { background: var(--warning-bg); color: var(--warning); border: 0.5px solid rgba(232,160,48,0.25); }
  .risk-pill.low { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }
  .risk-pill.none { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }

  .kw-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .kw { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 1px 7px; border-radius: 20px; }
  .kw.match { background: rgba(232,160,48,0.1); color: var(--warning); border: 0.5px solid rgba(232,160,48,0.2); }
  .kw.only { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }
  .kw.board-tag { background: var(--info-bg, rgba(80,144,232,0.1)); color: var(--info, #5090e8); border: 0.5px solid rgba(80,144,232,0.2); }

  .notice { font-size: 12px; color: var(--text3); margin-top: 14px; line-height: 1.7; padding: 10px 14px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); }

  footer { border-top: 0.5px solid var(--border); padding: 20px 0; margin-top: 60px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
</style>

<script>
// Proxy list — tried in order, falls back on failure
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];
const SEARCH_CANDIDATES = 10;
const LIST_CANDIDATES   = 10;

const BOARDS = {
  classic: {
    id: 'classic',
    label: '리니지 클래식',
    sub: '팁 게시판 · 6485',
    pattern: 'inven.co.kr/board/lineageclassic/6485',
    listUrl: 'https://www.inven.co.kr/board/lineageclassic/6485',
    searchUrl: 'https://www.inven.co.kr/board/lineageclassic/6485?query=',
    postRe: /inven\.co\.kr\/board\/lineageclassic\/6485\/\d+/,
  },
  lineagem: {
    id: 'lineagem',
    label: '리니지M',
    sub: '팁 게시판 · 5056',
    pattern: 'inven.co.kr/board/lineagem/5056',
    listUrl: 'https://www.inven.co.kr/board/lineagem/5056',
    searchUrl: 'https://www.inven.co.kr/board/lineagem/5056?query=',
    postRe: /inven\.co\.kr\/board\/lineagem\/5056\/\d+/,
  },
  lineage: {
    id: 'lineage',
    label: '리니지',
    sub: '팁 게시판 · 348',
    pattern: 'inven.co.kr/board/lineage/348',
    listUrl: 'https://www.inven.co.kr/board/lineage/348',
    searchUrl: 'https://www.inven.co.kr/board/lineage/348?query=',
    postRe: /inven\.co\.kr\/board\/lineage\/348\/\d+/,
  },
  classic2: {
    id: 'classic2',
    label: '리니지 클래식',
    sub: '자유 게시판 · 6497',
    pattern: 'inven.co.kr/board/lineageclassic/6497',
    listUrl: 'https://www.inven.co.kr/board/lineageclassic/6497',
    searchUrl: 'https://www.inven.co.kr/board/lineageclassic/6497?query=',
    postRe: /inven\.co\.kr\/board\/lineageclassic\/6497\/\d+/,
  },
};


const STOP = new Set(['이','그','저','것','수','들','등','및','을','를','이','가','은','는','에','의','도','와','과','하다','있다','없다','되다','하','에서','으로','로','가','이','한','이다','있','없','하고','또','더','때','같은','같이','위해','통해','대한','대해','많은','많이','모든','이런','이러한','그런','그러한','저런','어떤','어느','제','내','우리','자신','자체','이미','아직','이제','곧','다시','또한','그리고','하지만','그러나','그래서','따라서','즉','단','다만','오직','특히','정말','매우','아주','너무','조금','약간','잘','더욱','가장','바로','먼저','마지막','결국','사실','실제','다른','새로운','좋은','큰','작은','높은','낮은','빠른','느린','강한','약한','쉬운','어려운','중요한','필요한','가능한','다양한','여러','몇','각','각각','모두','전체','전부','전혀','항상','보통','종종','자주','가끔','때로','약','이상','이하','미만','초과','부터','까지','동안','사이','안','밖','위','아래','앞','뒤','그것','이것','저것','누구','무엇','어디','언제','왜','어떻게','얼마나','번','개','명','년','월','일','시','분','초','게시물','게시판','공략','리니지','클래식','인벤','작성','내용','정보','확인','경우','방법','사용','이용','참고','기준','현재','추천','질문','답변','댓글','글','쓰기','읽기','보기','클릭','링크','주소','아이디','닉네임','레벨','서버','캐릭터','캐릭','아이템','아이','스킬','스','퀘스트','퀘','던전','몬스터','몹','보스','파티','길드','혈맹','상점','거래','골드','경험치','스탯','능력치','공격','방어','마력','체력','마나','쿨타임','쿨']);

let isLoading = false;

// ── Utilities ──────────────────────────────────────────────

async function proxyFetch(url) {
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const r = await fetch(makeProxy(url), { signal: AbortSignal.timeout(12000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      if (text.length < 200) throw new Error('응답이 너무 짧음');
      return text;
    } catch(e) { lastErr = e; }
  }
  throw new Error('모든 프록시 실패: ' + (lastErr?.message || ''));
}

function parsePost(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let title = '';
  for (const sel of ['.articleTitle','.view-title','h1.tit','title']) {
    const el = doc.querySelector(sel);
    if (el) { title = el.textContent.trim(); break; }
  }
  // strip "리니지 클래식 인벤" suffix from <title>
  title = title.replace(/\s*[-|]\s*리니지.*$/i, '').replace(/\s*[-|]\s*인벤.*$/i, '').trim();

  let body = '';
  for (const sel of ['#powerbbsContent','.powerbbsContent','.view-content','.article-content','.board-view']) {
    const el = doc.querySelector(sel);
    if (el) {
      el.querySelectorAll('script,style,img,iframe,noscript').forEach(x => x.remove());
      body = el.textContent.replace(/\s+/g,' ').trim();
      break;
    }
  }
  return { title, body, text: title + ' ' + body };
}

// Extract post links from board listing or search results page
function extractPostLinks(html, excludeUrl, board) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const links = [];
  const seen = new Set();

  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    let url = href.startsWith('http') ? href : (href.startsWith('/') ? 'https://www.inven.co.kr' + href : '');
    if (!url) return;
    if (!board.postRe.test(url)) return;
    // Remove query string fragments
    url = url.split('?')[0];
    if (seen.has(url)) return;
    if (excludeUrl && url === excludeUrl.split('?')[0]) return;
    seen.add(url);
    links.push(url);
  });

  return links;
}

// ── NLP ────────────────────────────────────────────────────

// ── NLP helpers ──────────────────────────────────────────

// Korean verb/adjective ending normalization → stem
function normalizeStem(word) {
  if (!word || !/[\uAC00-\uD7A3]/.test(word)) return word;
  // 합니다/합니까/했습니다/하였습니다 → 하
  word = word.replace(/(합니다|합니까|했습니다|하였습니다|했어요|해요|하세요|하였|했|해서|하여|하고|하면|하는|하기|하지|하며|하니|한다|함)$/, '하');
  // 있습니다/있어요/있어서/있으면/있는/있다 → 있
  word = word.replace(/(있습니다|있어요|있습니까|있어서|있으면|있는데|있으니|있고|있지|있다|있음)$/, '있');
  // 없습니다/없어요/없다 → 없
  word = word.replace(/(없습니다|없어요|없습니까|없어서|없으면|없는데|없으니|없고|없지|없다|없음)$/, '없');
  // 됩니다/되었습니다/됐습니다 → 되
  word = word.replace(/(됩니다|됩니까|되었습니다|됐습니다|되었어요|됐어요|되어서|돼서|되면|되는|되고|되지|된다|됨)$/, '되');
  // 입니다/이에요/이어요 → 이
  word = word.replace(/(입니다|입니까|이에요|이어요|이어서|이라서|이면|이고|이지|인데|이라|임)$/, '이');
  // 줍니다/주세요/줍니까 → 주
  word = word.replace(/(줍니다|줍니까|주세요|주었습니다|줬습니다|주어서|줘서|주면|주는|주고|주지|준다|줌)$/, '주');
  // 나옵니다/나와요 → 나오
  word = word.replace(/(나옵니다|나옵니까|나와요|나와서|나오면|나오는|나오고|나온다|나옴)$/, '나오');
  // Generic -ㅂ니다/-습니다 endings not caught above
  word = word.replace(/(ㅂ니다|습니다|ㅂ니까|습니까)$/, '');
  // Strip common verb/adjective suffixes to get cleaner stems
  word = word.replace(/(이용하|접속하|진행하|실행하|설치하|확인하|제공하|시작하|완료하|설정하|활용하|적용하|추가하|제거하|변경하|선택하|입력하|출력하|저장하|불러오|가져오|나타나|사라지)$/, (m) => m.slice(0,-1));
  // Strip -아/어/여서, -고서, -는데 endings  
  word = word.replace(/(아서|어서|여서|고서|는데|으며|하며|이며)$/, '');
  return word;
}

function stripParticles(word) {
  if (!word || !/[\uAC00-\uD7A3]/.test(word)) return word;
  const particles = ['에서의','으로서','로서','으로써','로써','이므로','으로도','로도','에서도','에서는','에서가','들이','들을','들은','들도','들과','들에','들의','들로','들만','들에서','것이','것을','것은','것도','것만','것과','것에','이라는','라는','이라도','이라고','에서','으로','부터','까지','에게','한테','처럼','보다','이고','이며','이면','이나','이랑','으론','에선','이에','이게','이거','이것','이의','가의','을의','를의','도의','만의','과의','와의','이','가','을','를','은','는','의','에','도','만','과','와','로'];
  for (const p of particles) {
    if (word.endsWith(p) && word.length > p.length + 1) return word.slice(0, -p.length);
  }
  return word;
}

// Token type classifier for weighting
function tokenWeight(token) {
  // English acronym (all caps, 2-5 chars): ATS, PC, HP, MP
  if (/^[A-Z]{2,5}$/.test(token)) return 3.5;
  // Mixed Korean+English or English+Korean: PC방, 아이템ID
  if (/[a-zA-Z]/.test(token) && /[\uAC00-\uD7A3]/.test(token)) return 3.0;
  // Pure English word (lowercase): google, discord
  if (/^[a-zA-Z]{2,}$/.test(token)) return 2.5;
  // Number+Korean unit: 10분, 100골드 — lower value
  if (/^\d+[\uAC00-\uD7A3]+$/.test(token)) return 0.4;
  // Pure number
  if (/^\d+$/.test(token)) return 0.1;
  // Long Korean word (≥4 chars) tends to be specific
  if (/^[\uAC00-\uD7A3]+$/.test(token) && token.length >= 4) return 1.4;
  return 1.0;
}

function extractNgrams(tokens) {
  const result = [...tokens];
  for (let i = 0; i < tokens.length - 1; i++) {
    if (!/^\d+$/.test(tokens[i]) && !/^\d+$/.test(tokens[i+1])) {
      result.push(tokens[i] + ' ' + tokens[i+1]);
    }
  }
  return result;
}

function tokenize(text) {
  const raw = text
    .replace(/[^\uAC00-\uD7A3\u3130-\u318F\u1100-\u11FFa-zA-Z0-9]/g, ' ')
    .split(/\s+/).map(t => t.trim()).filter(Boolean);
  const tokens = [];
  for (const t of raw) {
    const stripped = stripParticles(t);
    const stemmed = normalizeStem(stripped);
    if (stemmed.length >= 2 && !STOP.has(stemmed) && !STOP.has(stripped)) {
      tokens.push(stemmed);
    }
  }
  return tokens;
}

function topKeywords(tokens, n=12) {
  const ngrams = extractNgrams(tokens);
  const freq = {};
  ngrams.forEach(t => { freq[t] = (freq[t]||0) + 1; });

  return Object.entries(freq)
    .map(([term, f]) => {
      // Base score: frequency
      let score = f;
      // Bigram boost
      if (term.includes(' ')) {
        const [a, b] = term.split(' ');
        score *= 1.8 * Math.sqrt(tokenWeight(a) * tokenWeight(b));
      } else {
        score *= tokenWeight(term);
      }
      return { term, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, n).map(e => e.term);
}


function buildTF(tokens) {
  const tf = {};
  tokens.forEach(t => { tf[t] = (tf[t]||0) + 1; });
  const len = tokens.length || 1;
  Object.keys(tf).forEach(t => tf[t] /= len);
  return tf;
}

function buildIDF(docs) {
  const df = {}, N = docs.length;
  docs.forEach(tokens => {
    new Set(extractNgrams(tokens)).forEach(t => { df[t] = (df[t]||0) + 1; });
  });
  const idf = {};
  Object.keys(df).forEach(t => { idf[t] = Math.log((N+1)/(df[t]+1)) + 1; });
  return idf;
}

function tfidfVec(tokens, idf) {
  const ngrams = extractNgrams(tokens);
  const tf = buildTF(ngrams);
  const vec = {};
  Object.keys(tf).forEach(t => { vec[t] = tf[t] * (idf[t] || Math.log(2) + 1); });
  return vec;
}

function cosine(a, b) {
  let dot=0, ma=0, mb=0;
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  keys.forEach(k => {
    const av=a[k]||0, bv=b[k]||0;
    dot+=av*bv; ma+=av*av; mb+=bv*bv;
  });
  return (!ma||!mb) ? 0 : dot / Math.sqrt(ma*mb);
}

function riskLevel(score) {
  if (score >= 0.70) return 'high';
  if (score >= 0.42) return 'medium';
  if (score >= 0.20) return 'low';
  return 'none';
}

// ── Step UI ────────────────────────────────────────────────

let stepEl = {};

function setStep(id, cls, label) {
  const el = stepEl[id];
  if (!el) return;
  el.className = 'step ' + cls;
  if (label) el.textContent = label;
}

// ── Main ───────────────────────────────────────────────────

async function run() {
  if (isLoading) return;
  const rawUrl = document.getElementById('urlInput').value.trim();
  const area = document.getElementById('area');

  if (!rawUrl) { area.innerHTML = '<div class="error-box">URL을 입력해주세요.</div>'; return; }
  const targetUrl = rawUrl.startsWith('http') ? rawUrl : 'https://' + rawUrl;
  const sourceBoard = Object.values(BOARDS).find(b => targetUrl.includes(b.pattern));
  if (!sourceBoard) {
    area.innerHTML = '<div class="error-box">지원하는 게시판의 URL이 아닙니다.<br>리니지 클래식 팁(6485)·자유(6497), 리니지M(5056), 리니지(348) 게시판 URL을 입력해주세요.</div>';
    return;
  }

  isLoading = true;
  document.getElementById('analyzeBtn').disabled = true;

  area.innerHTML = `
    <div class="loading-wrap">
      <div class="loading-head"><span class="spinner"></span> 자동으로 유사 게시물을 검색하는 중...</div>
      <div class="step-list">
        <div class="step active" id="s1">조사 대상 게시물 수집 중</div>
        <div class="step" id="s2">핵심 키워드 추출 중</div>
        <div class="step" id="s3">3개 게시판에서 유사 후보 검색 중</div>
        <div class="step" id="s4">후보 게시물 내용 수집 중</div>
        <div class="step" id="s5">유사도 분석 중</div>
      </div>
    </div>`;

  // cache step elements
  ['s1','s2','s3','s4','s5'].forEach(id => { stepEl[id] = document.getElementById(id); });

  try {
    // Step 1: fetch target post
    let targetHtml;
    try { targetHtml = await proxyFetch(targetUrl); }
    catch { throw new Error('조사 대상 게시물을 불러오지 못했습니다. URL을 확인해주세요.'); }
    const target = parsePost(targetHtml);
    if (!target.body || target.body.length < 30) throw new Error('게시물 본문을 읽을 수 없습니다. 로그인이 필요하거나 삭제된 게시물일 수 있습니다.');
    setStep('s1', 'done', '조사 대상 게시물 수집 완료');

    // Step 2: extract keywords
    setStep('s2', 'active');
    const targetTokens = tokenize(target.text);
    const keywords = topKeywords(targetTokens, 5);
    setStep('s2', 'done', `핵심 키워드 추출 완료: ${keywords.join(', ')}`);

    // Step 3: gather candidate URLs from ALL boards
    setStep('s3', 'active');
    const candidateUrls = new Set();
    const cleanTarget = targetUrl.split('?')[0];

    const searchPasses = [
      keywords.slice(0, 3).join(' '),
      keywords.slice(2, 5).join(' '),
    ];

    await Promise.allSettled(Object.values(BOARDS).flatMap(board => [
      // search passes per board
      ...searchPasses.filter(q => q.trim()).map(async q => {
        const shtml = await proxyFetch(board.searchUrl + encodeURIComponent(q));
        extractPostLinks(shtml, cleanTarget, board).slice(0, SEARCH_CANDIDATES).forEach(u => candidateUrls.add(u));
      }),
      // recent listing per board
      (async () => {
        const lhtml = await proxyFetch(board.listUrl);
        extractPostLinks(lhtml, cleanTarget, board).slice(0, LIST_CANDIDATES).forEach(u => candidateUrls.add(u));
      })(),
    ]));

    const urlList = [...candidateUrls].slice(0, 50);
    if (urlList.length === 0) throw new Error('비교할 게시물을 찾지 못했습니다. 게시판 접근이 제한되어 있거나 검색 결과가 없습니다.');
    setStep('s3', 'done', `3개 게시판 후보 ${urlList.length}건 발견`);

    // Step 4: fetch candidate posts (parallel, best-effort)
    setStep('s4', 'active');
    const fetched = await Promise.allSettled(
      urlList.map(async u => {
        const html = await proxyFetch(u);
        const post = parsePost(html);
        const boardTag = Object.values(BOARDS).find(b => b.postRe.test(u));
        return { url: u, boardLabel: boardTag ? boardTag.label : '', ...post };
      })
    );
    const candidates = fetched
      .filter(r => r.status === 'fulfilled' && r.value.body && r.value.body.length >= 30)
      .map(r => r.value);

    if (candidates.length === 0) throw new Error('후보 게시물들을 불러오는 데 모두 실패했습니다.');
    setStep('s4', 'done', `${candidates.length}건 수집 완료`);

    // Step 5: TF-IDF + cosine similarity
    setStep('s5', 'active');
    await new Promise(r => setTimeout(r, 100)); // let UI paint

    const allDocs = [targetTokens, ...candidates.map(c => tokenize(c.text))];
    const idf = buildIDF(allDocs);
    const targetVec = tfidfVec(targetTokens, idf);

    const results = candidates.map(c => {
      const tokens = tokenize(c.text);
      const vec = tfidfVec(tokens, idf);
      const score = cosine(targetVec, vec);
      const kwC = topKeywords(tokens, 12);
      const kwT = new Set(topKeywords(targetTokens, 12));
      const shared = kwC.filter(k => kwT.has(k));
      const onlyC = kwC.filter(k => !kwT.has(k)).slice(0, 4);
      return { ...c, score, shared, onlyC, pct: Math.round(score * 100) };
    });

    results.sort((a, b) => b.score - a.score);
    setStep('s5', 'done', '분석 완료');

    renderResult(target, targetUrl, results);

  } catch(err) {
    area.innerHTML = `<div class="error-box">오류: ${esc(err.message)}</div>`;
  }

  isLoading = false;
  document.getElementById('analyzeBtn').disabled = false;
}

// ── Render ─────────────────────────────────────────────────

function renderResult(target, targetUrl, results) {
  const highCount   = results.filter(r => r.pct >= 70).length;
  const mediumCount = results.filter(r => r.pct >= 42 && r.pct < 70).length;

  let html = `
  <div class="result-head">
    <span class="section-label">조사 대상 게시물</span>
    <div class="target-card">
      <div class="target-title">${esc(target.title || '제목 없음')}</div>
      <a class="target-url" href="${esc(targetUrl)}" target="_blank">${esc(targetUrl)}</a>
    </div>

    <div class="summary-row">
      <div class="summary-chip">
        <div class="summary-chip-val ${highCount > 0 ? 'danger' : ''}">${highCount}</div>
        <div class="summary-chip-label">도용 의심 높음</div>
      </div>
      <div class="summary-chip">
        <div class="summary-chip-val ${mediumCount > 0 ? 'warning' : ''}">${mediumCount}</div>
        <div class="summary-chip-label">부분 유사</div>
      </div>
      <div class="summary-chip">
        <div class="summary-chip-val">${results.length}</div>
        <div class="summary-chip-label">총 비교 건수</div>
      </div>
    </div>
  </div>

  <span class="section-label">유사도 순위</span>
  <table class="results-table">
    <thead>
      <tr>
        <th style="width:32px">#</th>
        <th>게시물</th>
        <th class="right" style="width:160px">유사도</th>
        <th style="width:90px">판정</th>
      </tr>
    </thead>
    <tbody>`;

  results.forEach((r, i) => {
    const rl = riskLevel(r.score);
    const sharedKw = r.shared.slice(0, 5).map(k => `<span class="kw match">${esc(k)}</span>`).join('');
    const onlyKw   = r.onlyC.slice(0, 3).map(k => `<span class="kw only">${esc(k)}</span>`).join('');

    html += `
      <tr>
        <td class="rank-num">${i+1}</td>
        <td>
          <div class="post-name"><a href="${esc(r.url)}" target="_blank">${esc(r.title || '제목 없음')}</a></div>
          <div class="kw-row">${r.boardLabel ? `<span class="kw board-tag">${esc(r.boardLabel)}</span>` : ''}${sharedKw}${onlyKw}</div>
        </td>
        <td class="bar-cell">
          <div class="bar-wrap">
            <div class="bar-track"><div class="bar-fill ${rl}" style="width:${r.pct}%"></div></div>
            <span class="bar-pct ${rl}">${r.pct}%</span>
          </div>
        </td>
        <td><span class="risk-pill ${rl}">${{high:'도용의심',medium:'부분유사',low:'낮음',none:'이상없음'}[rl]}</span></td>
      </tr>`;
  });

  html += `</tbody></table>
  <div class="notice">
    키워드 색상: <span style="color:var(--warning)">주황색</span> = 조사 대상과 공통 키워드 &nbsp;|&nbsp; <span style="color:var(--text3)">회색</span> = 해당 게시물의 고유 키워드<br>
    유사도는 TF-IDF 코사인 유사도 기준입니다. 같은 게임 특성상 용어 중복으로 수치가 높게 나올 수 있으니, 70% 이상 게시물을 우선적으로 직접 확인하세요.
  </div>`;

  document.getElementById('area').innerHTML = html;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') run(); });
});
</script>
</body>
</html>
