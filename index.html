<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리니지 클래식 공략 도용 검사기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8ea;
    --text2: #8a8a92;
    --text3: #55555c;
    --accent: #e8a030;
    --accent2: #b87820;
    --danger: #e85050;
    --danger-bg: rgba(232,80,80,0.1);
    --warning: #e8a030;
    --warning-bg: rgba(232,160,48,0.1);
    --success: #4caf80;
    --success-bg: rgba(76,175,128,0.1);
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .layout { max-width: 760px; margin: 0 auto; padding: 0 20px; }

  header {
    border-bottom: 0.5px solid var(--border);
    padding: 20px 0;
    margin-bottom: 40px;
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .logo-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .key-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 0.5px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .key-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Setup screen ── */
  .setup-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 0;
    text-align: center;
  }
  .setup-icon {
    width: 52px; height: 52px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 20px;
  }
  .setup-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.03em; }
  .setup-desc { font-size: 14px; color: var(--text2); max-width: 420px; line-height: 1.7; margin-bottom: 28px; }
  .setup-box {
    width: 100%; max-width: 440px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    text-align: left;
  }
  .form-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent2); }
  .form-input::placeholder { color: var(--text3); }
  .form-hint {
    font-size: 12px;
    color: var(--text3);
    margin-top: 8px;
    line-height: 1.5;
  }
  .form-hint a { color: var(--accent2); text-decoration: none; }
  .form-hint a:hover { text-decoration: underline; }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: var(--radius);
    padding: 11px 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #f0b040; }
  .btn-primary:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  /* ── Main screen ── */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }

  .url-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .url-input {
    flex: 1;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    font-family: 'IBM Plex Mono', monospace;
  }
  .url-input:focus { border-color: var(--accent2); }
  .url-input::placeholder { color: var(--text3); font-size: 12px; }
  .analyze-btn {
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .analyze-btn:hover { background: #f0b040; }
  .analyze-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  .tip-bar {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* ── Loading ── */
  .loading-panel {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
  }
  .loading-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-list { display: flex; flex-direction: column; gap: 6px; }
  .step-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    padding-left: 18px;
    position: relative;
  }
  .step-item::before { content: '·'; position: absolute; left: 6px; }
  .step-item.active { color: var(--text2); }
  .step-item.done { color: var(--success); }
  .step-item.done::before { content: '✓'; }

  /* ── Error ── */
  .error-panel {
    background: var(--danger-bg);
    border: 0.5px solid rgba(232,80,80,0.25);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    color: var(--danger);
  }

  /* ── Result ── */
  .result-section { margin-bottom: 24px; }

  .post-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .post-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .post-card-summary { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .post-card-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-decoration: none;
    display: block;
    margin-top: 8px;
    word-break: break-all;
  }
  .post-card-link:hover { text-decoration: underline; }

  .risk-banner {
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .risk-banner.high { background: var(--danger-bg); border: 0.5px solid rgba(232,80,80,0.25); }
  .risk-banner.medium { background: var(--warning-bg); border: 0.5px solid rgba(232,160,48,0.25); }
  .risk-banner.low, .risk-banner.none { background: var(--success-bg); border: 0.5px solid rgba(76,175,128,0.25); }
  .risk-banner.unknown { background: var(--bg2); border: 0.5px solid var(--border); }
  .risk-glyph {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    flex-shrink: 0;
    line-height: 1;
  }
  .risk-glyph.high { color: var(--danger); }
  .risk-glyph.medium { color: var(--warning); }
  .risk-glyph.low, .risk-glyph.none { color: var(--success); }
  .risk-glyph.unknown { color: var(--text3); }
  .risk-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .risk-label.high { color: var(--danger); }
  .risk-label.medium { color: var(--warning); }
  .risk-label.low, .risk-label.none { color: var(--success); }
  .risk-label.unknown { color: var(--text2); }
  .risk-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    margin-top: 3px;
  }
  .risk-score.high { color: rgba(232,80,80,0.7); }
  .risk-score.medium { color: rgba(232,160,48,0.7); }
  .risk-score.low, .risk-score.none { color: rgba(76,175,128,0.7); }
  .risk-score.unknown { color: var(--text3); }

  .explanation-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.8;
  }

  .source-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 8px;
  }
  .source-item:last-child { margin-bottom: 0; }
  .source-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .source-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .sim-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .sim-badge.high { background: var(--danger-bg); color: var(--danger); border: 0.5px solid rgba(232,80,80,0.2); }
  .sim-badge.medium { background: var(--warning-bg); color: var(--warning); border: 0.5px solid rgba(232,160,48,0.2); }
  .sim-badge.low { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }
  .source-evidence { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 6px; }
  .source-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-decoration: none;
    word-break: break-all;
  }
  .source-link:hover { text-decoration: underline; }

  .notice {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
    margin-top: 8px;
  }

  .divider { height: 0.5px; background: var(--border); margin: 8px 0 24px; }

  footer {
    border-top: 0.5px solid var(--border);
    padding: 20px 0;
    margin-top: 60px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
</style>
</head>
<body>

<header>
  <div class="layout header-inner">
    <div class="logo">
      <span class="logo-mark">LINEAGE</span>
      <span class="logo-title">공략 도용 검사기</span>
    </div>
    <button class="key-btn" id="changeKeyBtn" onclick="showSetup()" style="display:none;">API_KEY 변경</button>
  </div>
</header>

<main class="layout">

  <!-- Setup Screen -->
  <div class="screen active" id="setupScreen">
    <div class="setup-wrap">
      <div class="setup-icon">🔑</div>
      <div class="setup-title">Gemini API 키 설정</div>
      <div class="setup-desc">
        이 도구는 Google Gemini AI를 사용합니다.<br>
        API 키는 브라우저에만 저장되며, 서버로 전송되지 않습니다.
      </div>
      <div class="setup-box">
        <label class="form-label" for="apiKeyInput">GEMINI API KEY</label>
        <input
          type="password"
          class="form-input"
          id="apiKeyInput"
          placeholder="AIza..."
          autocomplete="off"
        />
        <div class="form-hint">
          <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>에서
          무료로 발급받을 수 있습니다. (구글 계정 로그인 필요)
        </div>
        <button class="btn-primary" onclick="saveKey()">저장하고 시작하기</button>
      </div>
    </div>
  </div>

  <!-- Main Screen -->
  <div class="screen" id="mainScreen">

    <span class="section-label">게시물 URL 입력</span>
    <div class="url-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://www.inven.co.kr/board/lineageclassic/6485/..."
      />
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">분석하기</button>
    </div>

    <div class="tip-bar">
      인벤 리니지 클래식 팁 게시판(게시판 번호 6485)의 게시물 URL만 분석 가능합니다.
      분석에는 20~40초 정도 소요됩니다.
    </div>

    <div id="resultArea"></div>
  </div>

</main>

<footer>
  <div class="layout">lineage classic · 공략 도용 검사기 · powered by gemini</div>
</footer>

<script>
const BOARD_URL = 'inven.co.kr/board/lineageclassic/6485';
const MODEL = 'gemini-2.0-flash';
const SYSTEM_PROMPT = `당신은 한국 게임 커뮤니티 게시물의 표절 탐지 전문가입니다.
인벤 리니지 클래식 팁 게시판(inven.co.kr/board/lineageclassic/6485)의 게시물 URL을 받으면:
1. 웹 검색으로 해당 게시물의 제목과 본문 내용을 확인합니다
2. 게시물의 핵심 내용, 전략, 특이한 표현, 수치를 추출합니다
3. 같은 게시판(lineageclassic 6485)에서 유사한 내용의 게시물을 여러 차례 검색합니다
4. 유사도를 분석하여 도용 여부를 판단합니다

반드시 아래 JSON 형식만 반환하세요. 마크다운 코드블록(\`\`\`), 설명, 서문 없이 순수 JSON만 반환하세요:
{
  "originalPost": {
    "title": "분석 대상 게시물 제목",
    "url": "분석 대상 게시물 URL",
    "summary": "게시물 내용 요약 (한국어, 2-3문장)"
  },
  "riskLevel": "high|medium|low|none|unknown",
  "riskScore": 0부터 100 사이 정수,
  "explanation": "분석 설명 (한국어, 3-5문장으로 상세히. 왜 이런 판정을 내렸는지 근거 포함)",
  "suspectedSources": [
    {
      "title": "유사 게시물 제목",
      "url": "유사 게시물 URL",
      "similarity": "high|medium|low",
      "evidence": "어떤 부분이 유사한지 구체적 설명 (한국어)"
    }
  ]
}
riskLevel 기준:
- high: 핵심 내용이 80% 이상 동일하거나 거의 그대로 복사한 경우
- medium: 내용의 50~79%가 유사하거나 구조·전략이 매우 비슷한 경우
- low: 30~49% 유사, 주제만 비슷한 독창적 내용이 있는 경우
- none: 30% 미만 유사, 독창적인 공략인 경우
- unknown: 게시물을 찾을 수 없거나 접근이 불가한 경우`;

let apiKey = '';
let isLoading = false;

function init() {
  const saved = localStorage.getItem('gemini_api_key');
  if (saved) {
    apiKey = saved;
    showMain();
  }
}

function saveKey() {
  const input = document.getElementById('apiKeyInput').value.trim();
  if (!input || !input.startsWith('AIza')) {
    alert('올바른 Gemini API 키를 입력해주세요. (AIza로 시작)');
    return;
  }
  apiKey = input;
  localStorage.setItem('gemini_api_key', apiKey);
  showMain();
}

function showMain() {
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('changeKeyBtn').style.display = '';
}

function showSetup() {
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('setupScreen').classList.add('active');
  document.getElementById('changeKeyBtn').style.display = 'none';
  document.getElementById('apiKeyInput').value = '';
}

async function analyze() {
  if (isLoading) return;
  const url = document.getElementById('urlInput').value.trim();
  const area = document.getElementById('resultArea');

  if (!url) { area.innerHTML = '<div class="error-panel">URL을 입력해주세요.</div>'; return; }
  if (!url.includes(BOARD_URL)) {
    area.innerHTML = '<div class="error-panel">인벤 리니지 클래식 팁 게시판(6485)의 URL만 분석 가능합니다.</div>';
    return;
  }

  isLoading = true;
  document.getElementById('analyzeBtn').disabled = true;

  area.innerHTML = `
    <div class="loading-panel">
      <div class="loading-title"><span class="spinner"></span> AI가 분석하고 있습니다...</div>
      <div class="step-list">
        <div class="step-item active" id="s1">게시물 내용 수집 중</div>
        <div class="step-item" id="s2">유사 게시물 검색 중</div>
        <div class="step-item" id="s3">유사도 비교 분석 중</div>
      </div>
    </div>`;

  const t1 = setTimeout(() => { mark('s1', 'done', '게시물 내용 수집 완료'); mark('s2', 'active'); }, 7000);
  const t2 = setTimeout(() => { mark('s2', 'done', '유사 게시물 검색 완료'); mark('s3', 'active'); }, 18000);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts: [{ text: `다음 URL의 게시물을 분석해주세요: ${url}` }] }],
          tools: [{ google_search: {} }]
        })
      }
    );

    clearTimeout(t1); clearTimeout(t2);

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message || 'API 오류');
    }

    const raw = data.candidates?.[0]?.content?.parts
      ?.filter(p => p.text)
      ?.map(p => p.text)
      ?.join('') || '';

    let parsed;
    try {
      const clean = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
      const jsonStart = clean.indexOf('{');
      const jsonEnd = clean.lastIndexOf('}');
      parsed = JSON.parse(clean.slice(jsonStart, jsonEnd + 1));
    } catch {
      throw new Error('응답 파싱 실패. 다시 시도해주세요.');
    }

    renderResult(parsed);

  } catch (err) {
    clearTimeout(t1); clearTimeout(t2);
    area.innerHTML = `<div class="error-panel">오류: ${esc(err.message)}</div>`;
  }

  isLoading = false;
  document.getElementById('analyzeBtn').disabled = false;
}

function mark(id, cls, label) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'step-item ' + cls;
  if (label) el.textContent = label;
}

function renderResult(d) {
  const rl = d.riskLevel || 'unknown';
  const score = d.riskScore ?? 0;
  const glyphs = { high: '!!', medium: '△', low: '◎', none: '✓', unknown: '?' };
  const labels = { high: '도용 의심 높음', medium: '부분 유사 의심', low: '유사도 낮음', none: '도용 없음', unknown: '분석 불가' };
  const simLabels = { high: '높은 유사도', medium: '중간 유사도', low: '낮은 유사도' };
  const sources = d.suspectedSources || [];

  let html = '';

  html += `<div class="result-section">
    <span class="section-label">분석 대상 게시물</span>
    <div class="post-card">
      <div class="post-card-title">${esc(d.originalPost?.title || '제목 없음')}</div>
      <div class="post-card-summary">${esc(d.originalPost?.summary || '')}</div>
      <a class="post-card-link" href="${esc(d.originalPost?.url || '')}" target="_blank">${esc(d.originalPost?.url || '')}</a>
    </div>
  </div>`;

  html += `<div class="result-section">
    <span class="section-label">판정 결과</span>
    <div class="risk-banner ${rl}">
      <div class="risk-glyph ${rl}">${glyphs[rl] || '?'}</div>
      <div>
        <div class="risk-label ${rl}">${labels[rl] || rl}</div>
        ${rl !== 'unknown' ? `<div class="risk-score ${rl}">유사도 점수 ${score}/100</div>` : ''}
      </div>
    </div>
  </div>`;

  html += `<div class="result-section">
    <span class="section-label">분석 근거</span>
    <div class="explanation-card">${esc(d.explanation || '')}</div>
  </div>`;

  html += `<div class="result-section">
    <span class="section-label">유사 의심 게시물 ${sources.length > 0 ? `(${sources.length}건)` : ''}</span>`;

  if (sources.length > 0) {
    sources.forEach(s => {
      html += `<div class="source-item">
        <div class="source-header">
          <div class="source-title">${esc(s.title || '제목 없음')}</div>
          <span class="sim-badge ${s.similarity || 'low'}">${simLabels[s.similarity] || ''}</span>
        </div>
        <div class="source-evidence">${esc(s.evidence || '')}</div>
        ${s.url ? `<a class="source-link" href="${esc(s.url)}" target="_blank">${esc(s.url)}</a>` : ''}
      </div>`;
    });
  } else {
    html += `<div class="explanation-card" style="color: var(--text3); font-size: 13px;">유사한 게시물이 발견되지 않았습니다.</div>`;
  }

  html += `</div>`;
  html += `<div class="notice">이 결과는 AI 분석이므로 참고용으로 활용하세요. 최종 판단은 운영진이 직접 원문을 비교해 결정하시기 바랍니다.</div>`;

  document.getElementById('resultArea').innerHTML = html;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
  document.getElementById('apiKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });
});
</script>
</body>
</html>
